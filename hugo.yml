baseURL: "https://blog.gerard.space/"
title: "Gerard's Blog"
disableKinds: ["taxonomy", "term"]
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageCode: "en-us"
    languageName: "English"
    weight: 1
  ca:
    languageCode: "ca"
    languageName: "Català"
    weight: 2
  es:
    languageCode: "es"
    languageName: "Español"
    weight: 3

pagination:
  pagerSize: 10

frontmatter:
  date:
    - ":filename"
    - ":default"

copyright: "© 2026 Gerard"

services:
  rss:
    limit: 100

params:
  author:
    name: Gerard

permalinks:
  blog: /:year/:month/:title/
